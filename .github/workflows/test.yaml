name: Test

on:
  # Allow workflow to be called by another workflow
  workflow_call:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      packages: ${{ steps.list-packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/
        with:
          force-install: true
          save-cache: true

      - name: List packages
        id: list-packages
        run: |
          packages=$(pnpm lerna ls --all --json | jq -c '[.[].name]')
          # Echo the packages to the console and set it as an output for the next job
          echo "packages=${packages}"
          echo "packages=${packages}" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: Test / ${{ matrix.package }}
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/

      - name: Lint
        run: pnpm --filter "${{ matrix.package }}" lint

      - name: Build
        run: pnpm --filter "${{ matrix.package }}" --if-present build

      - name: Typecheck
        run: pnpm --filter "${{ matrix.package }}" --if-present typecheck

      - name: Test
        run: pnpm --filter "${{ matrix.package }}" --if-present test
