name: Publish

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      # TODO: REMOVE BEFORE MERGE
      - feat/component-tokens-and-themes

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  run-tests:
    name: Tests
    uses: ./.github/workflows/test.yaml

  detect:
    name: Detect Changed Packages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/

      - name: Detect changed packages
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(pnpm lerna changed --since "origin/${BASE_REF}" --json 2>/dev/null || echo '[]')
          changed=$(echo "$changed" | jq -c '[.[].name]' 2>/dev/null || echo '[]')

          # If any critical root-level files changed, force preview publish for all packages.
          # Only include files that genuinely affect build output; lint/ts config and the lockfile
          # do not change dist artifacts and should not trigger unnecessary publishes.
          critical_files="pnpm-workspace.yaml package.json"
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          force_all=false
          for f in $critical_files; do
            if echo "$changed_files" | grep -qx "$f"; then
              force_all=true
              break
            fi
          done
          if [ "$force_all" = "true" ]; then
            echo "Critical root-level file(s) changed - forcing CI for all packages"
            changed=$(pnpm lerna ls --json 2>/dev/null | jq -c '[.[].name]' 2>/dev/null || echo '[]')
          fi

          # Echo the packages to the console and set it as an output for the next job
          echo "changed=${changed}"
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

  preview:
    name: Preview / ${{ matrix.package }}
    needs: [run-tests, detect]
    if: |
      github.event_name == 'pull_request' &&
      needs.detect.outputs.changed != '[]' &&
      needs.detect.outputs.changed != '' &&
      (github.actor != 'renovate[bot]' || contains(github.event.pull_request.labels.*.name, 'create preview package'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.changed) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.KONGPONENTS_BOT_PAT }}
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/

      - name: Prepare git
        run: |
          git config user.email "konnectx-engineers+kongponents-bot@konghq.com"
          git config user.name "Kong UI Bot"

      - name: Remove stale preview comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: pr_preview_${{ matrix.package }}
          delete: true
          GITHUB_TOKEN: ${{ secrets.KONGPONENTS_BOT_PAT }}

      - name: Build package
        run: pnpm --filter "${{ matrix.package }}" --if-present build

      - name: Publish package preview
        id: package-preview
        run: |
          preid="pr.${{ github.event.pull_request.number }}.$(git rev-parse --short ${{ github.event.pull_request.head.sha }})"
          tag="pr-${{ github.event.pull_request.number }}"
          pkg_name="${{ matrix.package }}"

          pkgdir=$(pnpm lerna ls --json | jq -r --arg n "${pkg_name}" '.[] | select(.name==$n) | .location')
          # Move into the package directory, bump the version with a unique prerelease tag, then move back to the root
          cd "$pkgdir" && pnpm version prerelease --preid "${preid}" --no-git-tag-version && cd -
          pkg_version=$(jq -r ".version" "${pkgdir}/package.json")

          package="${pkg_name}@${pkg_version}"

          pnpm view "${package}" version >/dev/null 2>&1 && pkg_exists=0 || pkg_exists=1
          if [ $pkg_exists -eq 0 ]; then
            echo "Package ${package} is already published. Skipping."
            exit 0
          fi

          publish_output=$(pnpm --filter "${pkg_name}" publish --no-git-checks --access public --report-summary --tag "${tag}" 2>&1)
          publish_exit=$?
          echo "${publish_output}"
          if [ $publish_exit -ne 0 ] || echo "${publish_output}" | grep -qiE "npm error|npm ERR!"; then
            echo "::error::npm publish failed for ${pkg_name}"
            exit 1
          fi

          npm_instructions="${pkg_name}@${tag}"

          echo "npm_instructions<<EOF" >> $GITHUB_OUTPUT
          echo -e "$npm_instructions" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post preview comment
        if: ${{ steps.package-preview.outputs.npm_instructions != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: pr_preview_${{ matrix.package }}
          message: |
            ### Install preview package: `${{ matrix.package }}`

            In your host project, install the preview package version generated by this PR:

            ```sh
            ${{ steps.package-preview.outputs.npm_instructions }}
            ```
          GITHUB_TOKEN: ${{ secrets.KONGPONENTS_BOT_PAT }}

  preview-complete:
    name: Preview Complete
    needs: [preview]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check preview result
        run: |
          if [[ "${{ needs.preview.result }}" == "failure" ]]; then
            echo "One or more preview jobs failed."
            exit 1
          fi
          echo "Preview jobs passed or were skipped."

  release:
    name: Release
    needs: [run-tests]
    if: github.event_name == 'push'
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.KONGPONENTS_BOT_PAT }}
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/
        with:
          force-install: true

      - name: Prepare git
        run: |
          git config user.email "konnectx-engineers+kongponents-bot@konghq.com"
          git config user.name "Kong UI Bot"

      - name: Build all packages
        run: pnpm build

      - name: Version and publish (main)
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.KONGPONENTS_BOT_PAT }}
        run: |
          pnpm lerna version --conventional-commits --yes
          publish_output=$(pnpm lerna publish from-git --yes 2>&1)
          publish_exit=$?
          echo "${publish_output}"
          if [ $publish_exit -ne 0 ] || echo "${publish_output}" | grep -qiE "npm error|npm ERR!"; then
            echo "::error::lerna publish failed"
            exit 1
          fi

      - name: Version and publish (prerelease)
        if: github.ref_name != 'main'
        env:
          GH_TOKEN: ${{ secrets.KONGPONENTS_BOT_PAT }}
          BRANCH: ${{ github.ref_name }}
        run: |
          pnpm lerna version --conventional-prerelease --preid "${BRANCH}" --yes
          publish_output=$(pnpm lerna publish from-git --dist-tag "${BRANCH}" --yes 2>&1)
          publish_exit=$?
          echo "${publish_output}"
          if [ $publish_exit -ne 0 ] || echo "${publish_output}" | grep -qiE "npm error|npm ERR!"; then
            echo "::error::lerna publish failed"
            exit 1
          fi

  build-sandbox:
    name: Build Sandbox
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup PNPM with Dependencies
        uses: ./.github/actions/setup-pnpm-with-dependencies/
        with:
          force-install: true

      - name: Build tokens package
        run: pnpm --filter @kong/design-tokens build

      - name: Build sandbox
        run: pnpm --filter @kong/design-tokens sandbox:build

      - name: Upload sandbox artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox
          path: packages/design-tokens/sandbox/dist/
          retention-days: 1

  deploy-github-pages:
    name: Deploy GitHub Pages
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [build-sandbox]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: 'pages'
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download sandbox
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sandbox
          path: packages/design-tokens/sandbox/dist

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './packages/design-tokens/sandbox/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
