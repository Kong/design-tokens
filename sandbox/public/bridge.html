<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>KUI Token Bridge</title></head>
<body>
<script>
(function () {
  // Relay CSS overrides from the customizer (same-origin BroadcastChannel) to the
  // target page (cross-origin parent) via parent.postMessage. This iframe is injected
  // by the bookmarklet and bypasses Cross-Origin-Opener-Policy restrictions that block
  // direct popup-to-customizer postMessage communication.
  var bc = new BroadcastChannel('kui-token-bridge');

  // Forward CSS pushed from the customizer to the parent page
  bc.onmessage = function (e) {
    if (e.data && e.data.type === 'kui-token-override') {
      parent.postMessage({ type: 'kui-token-override', css: e.data.css }, '*');
    }
  };

  // When the bookmarklet tells us the target origin, notify the customizer
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'kui-target-origin') {
      bc.postMessage({ type: 'kui-connected', origin: e.data.origin });
    }
  });

  // Signal the bookmarklet that we're loaded and ready
  parent.postMessage({ type: 'kui-bridge-ready' }, '*');
})();
</script>
</body>
</html>
